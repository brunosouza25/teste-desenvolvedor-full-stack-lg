services:
  app:
    container_name: laravel-app
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    volumes:
      - .:/var/www
      - /var/www/node_modules
    networks:
      - laravel
    depends_on:
      - db

  nginx:
    container_name: laravel-nginx
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel

  db:
    container_name: laravel-db
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: laravel_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - db-data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - laravel

  workspace:
    container_name: laravel-workspace
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    volumes:
      - .:/var/www
    working_dir: /var/www
    tty: true
    networks:
      - laravel
    entrypoint: ["/bin/sh"]

volumes:
  db-data:

networks:
  laravel:
    driver: bridge