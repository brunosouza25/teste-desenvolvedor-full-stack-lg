version: '3.8'

services:
  app:
    container_name: projeto-full-stack-bruno-souza-app
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    volumes:
      - .:/var/www
      - /var/www/node_modules
    networks:
      - projeto-full-stack-bruno-souza-network
    depends_on:
      - db

  nginx:
    container_name: projeto-full-stack-bruno-souza-nginx
    image: nginx:alpine
    ports:
      - "8077:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - projeto-full-stack-bruno-souza-network

  db:
    container_name: projeto-full-stack-bruno-souza-db
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: laravel_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - projeto-full-stack-bruno-souza-db-data:/var/lib/mysql
    ports:
      - "3325:3306"
    networks:
      - projeto-full-stack-bruno-souza-network

  workspace:
    container_name: projeto-full-stack-bruno-souza-workspace
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    volumes:
      - .:/var/www
    working_dir: /var/www
    tty: true
    networks:
      - projeto-full-stack-bruno-souza-network
    entrypoint: ["/bin/sh"]

volumes:
  projeto-full-stack-bruno-souza-db-data:

networks:
  projeto-full-stack-bruno-souza-network:
    driver: bridge
