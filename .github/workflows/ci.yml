name: CI - Planta A Dashboard

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Código
        uses: actions/checkout@v3

      - name: Criar arquivo .env
        run: cp .env.example .env

      - name: Build dos Containers
        run: docker compose build app

      - name: Subir Ambiente
        run: docker compose up -d app db

      - name: Instalar Dependências (Composer)
        run: |
          docker compose exec -u root -T app git config --global --add safe.directory /var/www
          docker compose exec -u root -T app composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Preparar Pastas e Permissões
        run: |
          docker compose exec -u root -T app mkdir -p bootstrap/cache storage/framework/sessions storage/framework/views storage/framework/cache
          docker compose exec -u root -T app chmod -R 777 storage bootstrap/cache

      - name: Gerar Application Key
        run: docker compose exec -T app php artisan key:generate

      - name: Aguardar Banco de Dados
        run: |
          attempt=0
          until [ $attempt -ge 5 ] || docker compose exec -T db mysqladmin ping -h"localhost" -u"root" -p"root" --silent; do
            echo "Aguardando MySQL..."
            sleep 5
            attempt=$((attempt+1))
          done

      - name: Rodar Migrations e Seeds
        run: docker compose exec -T app php artisan migrate:fresh --seed

      - name: Análise Estática (PHPStan)
        run: docker compose exec -T app ./vendor/bin/phpstan analyse --memory-limit=1G

      - name: Executar Testes (PHPUnit)
        run: docker compose exec -T app php artisan test

      - name: Derrubar Containers
        if: always()
        run: docker compose down
